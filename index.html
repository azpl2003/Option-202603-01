<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>美股期權收租日誌-T哥版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #faf7f2; color: #5c4033; padding-bottom: env(safe-area-inset-bottom); }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(92, 64, 51, 0.05); }
    </style>
</head>
<body class="safe-top">
    <nav class="bg-[#f0e6d2] border-b border-[#e6d5c3] sticky top-0 z-20 px-4 py-3">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg tracking-tight">美股期權收租日誌</h1>
                <p class="text-[10px] text-[#8d7b68]">2026年 T哥版</p>
            </div>
            <div id="exchange-rate" class="text-[10px] bg-white border border-[#e6d5c3] px-2 py-1 rounded-lg text-[#8d7b68]">
                USD/TWD: 32.50
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-2xl border border-[#e6d5c3] card-shadow">
                <p class="text-[10px] text-[#8d7b68] font-medium uppercase tracking-wider">總收租 (USD)</p>
                <p class="text-2xl font-bold text-[#6b8c42] mt-1">$0.00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-[#e6d5c3] card-shadow">
                <p class="text-[10px] text-[#8d7b68] font-medium uppercase tracking-wider">勝率</p>
                <p class="text-2xl font-bold text-[#8b5e3c] mt-1">0%</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button class="bg-[#8b5e3c] text-white py-4 rounded-2xl font-bold text-sm shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span>+</span> 新增 Sell Put
            </button>
            <button class="bg-[#8b5e3c] text-white py-4 rounded-2xl font-bold text-sm shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span>+</span> 新增 CC 策略
            </button>
        </div>

        <div class="pt-2">
            <h2 class="text-sm font-bold text-[#5c4033] flex items-center gap-2">
                <span class="w-1 h-4 bg-[#8b5e3c] rounded-full"></span>
                最近交易 (TSLA)
            </h2>
        </div>

        <div class="bg-white rounded-2xl border border-[#e6d5c3] p-10 text-center space-y-2">
            <p class="text-[#a4907c] text-sm font-medium">正在連線至 Firebase 資料庫...</p>
            <p class="text-[10px] text-[#d6c0b3]">請確保已在程式碼中填入 Firebase 金鑰</p>
        </div>
    </main>

    <script type="module">

// Initialize Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC0sRR_pt8q1__plAXPdW_zQBvpjdQFHYU",
  authDomain: "option-202603.firebaseapp.com",
  projectId: "option-202603",
  storageBucket: "option-202603.firebasestorage.app",
  messagingSenderId: "888897529337",
  appId: "1:888897529337:web:c4d503538881b558860928",
  measurementId: "G-9C2TV401ST"
};

const analytics = getAnalytics(app);
        // 匯率 API
        fetch('https://open.er-api.com/v6/latest/USD')
            .then(res => res.json())
            .then(data => {
                if(data.rates.TWD) document.getElementById('exchange-rate').innerText = `USD/TWD: ${data.rates.TWD.toFixed(2)}`;
            });
    </script>
</body>

</html>
